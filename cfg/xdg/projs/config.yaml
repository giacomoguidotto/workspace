    name: Workspace
    aliases: ["workspace", "cfg", "aerospace", "raycast"]
    path: life/workspace
    apps:
      browser:
        tabs:
          - https://github.com/GiacomoGuidotto/workspace
      terminal: {}
      editor: {}

